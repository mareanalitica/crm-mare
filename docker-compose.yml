version: '3.8'

# =============================================================================
# Stack Docker Swarm - Evo CRM Community
# Domínio Web: crm.mareanalitica.com.br
# Domínio API: crmapi.mareanalitica.com.br
# Utiliza o Postgres, Redis e Traefik compartilhados da rede 'marenet'
# =============================================================================

networks:
  marenet:
    external: true
    name: marenet

services:

  # ---------------------------------------------------------------------------
  # Gateway: Unifica o roteamento interno de microsserviços do CRM
  # ---------------------------------------------------------------------------
  evocrm_gateway:
    image: evoapicloud/evo-crm-gateway:latest

    networks:
      - marenet

    environment:
      - AUTH_UPSTREAM=evocrm_auth:3001
      - CRM_UPSTREAM=evocrm_crm:3000
      - CORE_UPSTREAM=evocrm_core:5555
      - PROCESSOR_UPSTREAM=evocrm_processor:8000
      - BOT_RUNTIME_UPSTREAM=evocrm_bot_runtime:8080

    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=marenet"
        - "traefik.http.routers.evocrm_gateway.rule=Host(`${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}`)"
        - "traefik.http.routers.evocrm_gateway.entrypoints=websecure"
        - "traefik.http.routers.evocrm_gateway.priority=1"
        - "traefik.http.routers.evocrm_gateway.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.evocrm_gateway.service=evocrm_gateway"
        - "traefik.http.services.evocrm_gateway.loadbalancer.server.port=3030"
        - "traefik.http.services.evocrm_gateway.loadbalancer.passHostHeader=true"

  # ---------------------------------------------------------------------------
  # Auth Service: Autenticação baseada em Rails
  # ---------------------------------------------------------------------------
  evocrm_auth:
    image: evoapicloud/evo-auth-service-community:latest
    command: bash -c "bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...'; bundle exec rails s -p 3001 -b 0.0.0.0"

    networks:
      - marenet

    environment:
      - RAILS_ENV=production
      - RAILS_MAX_THREADS=5

      # Segredos
      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - JWT_SECRET_KEY=${CRM_JWT_SECRET_KEY}
      - EVOAI_CRM_API_TOKEN=${CRM_EVOAI_CRM_API_TOKEN}

      # PostgreSQL Compartilhado
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=evocrm
      - POSTGRES_SSLMODE=disable

      # Redis Compartilhado (DB 1)
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      # URLs
      - FRONTEND_URL=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br}
      - BACKEND_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - CORS_ORIGINS=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br},https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

      # SMTP
      - SMTP_DOMAIN=${SMTP_DOMAIN:-mareanalitica.com.br}
      - MAILER_SENDER_EMAIL=${SMTP_FROM:-noreply@mareanalitica.com.br}
      - SMTP_USERNAME=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASS}
      - SMTP_ADDRESS=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=true

      # Doorkeeper
      - DOORKEEPER_JWT_SECRET_KEY=${CRM_DOORKEEPER_JWT_SECRET_KEY}
      - DOORKEEPER_JWT_ALGORITHM=hs256
      - DOORKEEPER_JWT_ISS=evo-auth-service

      - MFA_ISSUER=EvoCRM
      - SIDEKIQ_CONCURRENCY=10
      - ACTIVE_STORAGE_SERVICE=local
      - ACTIVE_STORAGE_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - OAUTH_TOKEN_EXPIRES_IN=28800

    volumes:
      - evoauth_storage:/app/storage
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Sidekiq Auth: Filas de Autenticação
  # ---------------------------------------------------------------------------
  evocrm_auth_sidekiq:
    image: evoapicloud/evo-auth-service-community:latest
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

    networks:
      - marenet

    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - JWT_SECRET_KEY=${CRM_JWT_SECRET_KEY}
      - EVOAI_CRM_API_TOKEN=${CRM_EVOAI_CRM_API_TOKEN}

      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=evocrm
      - POSTGRES_SSLMODE=disable

      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      - FRONTEND_URL=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br}
      - BACKEND_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - CORS_ORIGINS=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br},https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

      - SMTP_DOMAIN=${SMTP_DOMAIN:-mareanalitica.com.br}
      - MAILER_SENDER_EMAIL=${SMTP_FROM:-noreply@mareanalitica.com.br}
      - SMTP_USERNAME=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASS}
      - SMTP_ADDRESS=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=true

      - DOORKEEPER_JWT_SECRET_KEY=${CRM_DOORKEEPER_JWT_SECRET_KEY}
      - DOORKEEPER_JWT_ALGORITHM=hs256
      - DOORKEEPER_JWT_ISS=evo-auth-service

      - MFA_ISSUER=EvoCRM
      - SIDEKIQ_CONCURRENCY=10
      - ACTIVE_STORAGE_SERVICE=local
      - ACTIVE_STORAGE_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - OAUTH_TOKEN_EXPIRES_IN=28800

    volumes:
      - evoauth_storage:/app/storage
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # CRM Core Web (Rails Backend)
  # ---------------------------------------------------------------------------
  evocrm_crm:
    image: evoapicloud/evo-ai-crm-community:latest
    command: sh -c "until wget -qO- http://evocrm_auth:3001/health >/dev/null 2>&1; do echo 'Waiting for auth...'; sleep 5; done; bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...'; bundle exec rails s -p 3000 -b 0.0.0.0"

    networks:
      - marenet

    environment:
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true

      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - JWT_SECRET_KEY=${CRM_JWT_SECRET_KEY}
      - EVOAI_CRM_API_TOKEN=${CRM_EVOAI_CRM_API_TOKEN}

      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=evocrm
      - POSTGRES_SSLMODE=disable

      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      - EVO_AUTH_SERVICE_URL=http://evocrm_auth:3001
      - EVO_AI_CORE_SERVICE_URL=http://evocrm_core:5555

      - BACKEND_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - FRONTEND_URL=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br}
      - CORS_ORIGINS=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br},https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

      - DISABLE_TELEMETRY=true
      - LOG_LEVEL=info
      - ENABLE_ACCOUNT_SIGNUP=true
      - ENABLE_PUSH_RELAY_SERVER=true
      - ENABLE_INBOX_EVENTS=true

      - BOT_RUNTIME_URL=http://evocrm_bot_runtime:8080
      - BOT_RUNTIME_SECRET=${CRM_BOT_RUNTIME_SECRET}
      - BOT_RUNTIME_POSTBACK_BASE_URL=http://evocrm_crm:3000

      - ACTIVE_STORAGE_SERVICE=local
      - ACTIVE_STORAGE_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

    volumes:
      - evocrm_storage:/app/storage
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # CRM Sidekiq: Filas do Core CRM
  # ---------------------------------------------------------------------------
  evocrm_crm_sidekiq:
    image: evoapicloud/evo-ai-crm-community:latest
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

    networks:
      - marenet

    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - JWT_SECRET_KEY=${CRM_JWT_SECRET_KEY}
      - EVOAI_CRM_API_TOKEN=${CRM_EVOAI_CRM_API_TOKEN}

      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=evocrm
      - POSTGRES_SSLMODE=disable

      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      - EVO_AUTH_SERVICE_URL=http://evocrm_auth:3001
      - EVO_AI_CORE_SERVICE_URL=http://evocrm_core:5555

      - BACKEND_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - FRONTEND_URL=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br}
      - CORS_ORIGINS=https://${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br},https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

      - BOT_RUNTIME_URL=http://evocrm_bot_runtime:8080
      - BOT_RUNTIME_SECRET=${CRM_BOT_RUNTIME_SECRET}
      - BOT_RUNTIME_POSTBACK_BASE_URL=http://evocrm_crm:3000

      - ACTIVE_STORAGE_SERVICE=local
      - ACTIVE_STORAGE_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

    volumes:
      - evocrm_storage:/app/storage
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # AI Core Service (Go API)
  # ---------------------------------------------------------------------------
  evocrm_core:
    image: evoapicloud/evo-ai-core-service-community:latest

    networks:
      - marenet

    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=evocrm
      - DB_SSLMODE=disable

      - DB_MAX_IDLE_CONNS=10
      - DB_MAX_OPEN_CONNS=100
      - DB_CONN_MAX_LIFETIME=1h
      - DB_CONN_MAX_IDLE_TIME=30m

      - PORT=5555
      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - JWT_SECRET_KEY=${CRM_JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ENCRYPTION_KEY=${CRM_ENCRYPTION_KEY}

      - EVOLUTION_BASE_URL=http://evocrm_crm:3000
      - EVO_AUTH_BASE_URL=http://evocrm_auth:3001
      - AI_PROCESSOR_URL=http://evocrm_processor:8000
      - AI_PROCESSOR_VERSION=v1

    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # AI Processor (FastAPI / Agent Runner)
  # ---------------------------------------------------------------------------
  evocrm_processor:
    image: evoapicloud/evo-ai-processor-community:latest
    command: sh -c "alembic upgrade head 2>&1 || echo 'Alembic migration had errors, continuing...'; python -m scripts.run_seeders; uvicorn src.main:app --host $$HOST --port $$PORT"

    volumes:
      - evocrm_processor_logs:/app/logs

    networks:
      - marenet

    environment:
      - POSTGRES_CONNECTION_STRING=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evocrm?sslmode=disable

      # Redis DB 1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_SSL=false
      - REDIS_DB=1
      - REDIS_KEY_PREFIX=a2a_
      - REDIS_TTL=3600

      - HOST=0.0.0.0
      - PORT=8000

      - DEBUG=false
      - SECRET_KEY_BASE=${CRM_SECRET_KEY_BASE}
      - ENCRYPTION_KEY=${CRM_ENCRYPTION_KEY}
      - EVOAI_CRM_API_TOKEN=${CRM_EVOAI_CRM_API_TOKEN}

      - EVO_AUTH_BASE_URL=http://evocrm_auth:3001
      - EVO_AI_CRM_URL=http://evocrm_crm:3000
      - CORE_SERVICE_URL=http://evocrm_core:5555/api/v1

      - APP_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - API_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

      - API_TITLE=Agent Processor Community
      - API_DESCRIPTION=Agent Processor Community for Evo AI
      - API_VERSION=1.0.0
      - ORGANIZATION_NAME=Evo CRM

      - TOOLS_CACHE_ENABLED=true
      - TOOLS_CACHE_TTL=3600

    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Bot Runtime: Execução de Bots e Fluxos
  # ---------------------------------------------------------------------------
  evocrm_bot_runtime:
    image: evoapicloud/evo-bot-runtime:latest

    networks:
      - marenet

    environment:
      - LISTEN_ADDR=0.0.0.0:8080
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      - AI_PROCESSOR_URL=http://evocrm_processor:8000
      - BOT_RUNTIME_SECRET=${CRM_BOT_RUNTIME_SECRET}
      - AI_CALL_TIMEOUT_SECONDS=30

    deploy:
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Frontend UI (React Interface)
  # ---------------------------------------------------------------------------
  evocrm_frontend:
    image: evoapicloud/evo-ai-frontend-community:latest

    networks:
      - marenet

    environment:
      - VITE_APP_ENV=production
      - VITE_API_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - VITE_AUTH_API_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - VITE_EVOAI_API_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - VITE_AGENT_PROCESSOR_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}
      - VITE_WS_URL=https://${CRM_API_DOMAIN:-crmapi.mareanalitica.com.br}

    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=marenet"
        - "traefik.http.routers.evocrm_frontend.rule=Host(`${CRM_WEB_DOMAIN:-crm.mareanalitica.com.br}`)"
        - "traefik.http.routers.evocrm_frontend.entrypoints=websecure"
        - "traefik.http.routers.evocrm_frontend.priority=1"
        - "traefik.http.routers.evocrm_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.evocrm_frontend.service=evocrm_frontend"
        - "traefik.http.services.evocrm_frontend.loadbalancer.server.port=80"
        - "traefik.http.services.evocrm_frontend.loadbalancer.passHostHeader=true"

volumes:
  evocrm_processor_logs:
  evocrm_storage:
  evoauth_storage:
